name: ci

# Baseline CI for every push to `main` and every PR (PR #21, Phase 6.1).
# Split into two jobs so the Rust leg doesn't block on Node and vice versa;
# both are cached so re-runs are cheap.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    name: js (lint + typecheck + test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  rust:
    name: rust (clippy + test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/app/src-tauri/target
          key: cargo-${{ runner.os }}-ci-${{ hashFiles('packages/app/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-ci-

      # `-D warnings` deferred: the existing codebase has a handful of
      # non-blocking clippy suggestions (needless_borrow, let_unit_value,
      # etc.) that should be cleaned up in a follow-up rather than gated
      # on this PR. Tracked by the Phase 6 clippy-cleanup follow-up.
      - run: cargo clippy --manifest-path packages/app/src-tauri/Cargo.toml --all-targets

      - run: cargo test --manifest-path packages/app/src-tauri/Cargo.toml
