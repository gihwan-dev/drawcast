[package]
name = "drawcast-app"
version = "0.0.0"
description = "Drawcast desktop app"
edition = "2021"
rust-version = "1.77"

[lib]
name = "drawcast_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "drawcast-app"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
regex = "1"
anyhow = "1"
toml = "0.8"
dirs = "5"
nanoid = "0.4"

[dev-dependencies]
tempfile = "3"
